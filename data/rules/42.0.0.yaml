# PZ Build 42.0.0 — Major release breaking changes
# Source: https://pzwiki.net/wiki/Build_42
# These rules apply to all B42 versions (since 42.0.0)

version: "42.0.0"
release_date: "2024-11-01"
summary: "Major B42 release — crafting overhaul, item system rewrite, mod structure changes"
source: "https://pzwiki.net/wiki/Build_42"

changes:

  # --- STRUCTURAL REQUIREMENTS ---

  - id: b42-common-folder
    type: structure
    severity: warning
    since: "42.0.0"
    description: "B42 requires common/ folder in mod root (even if empty)"
    check: dir_exists
    path: "common/"

  - id: b42-versioned-folder
    type: structure
    severity: warning
    since: "42.0.0"
    description: "B42 mods should have a 42/ subfolder with media/ and mod.info"
    check: dir_exists
    path: "42/"

  # --- MOD.INFO REQUIREMENTS ---

  - id: b42-modinfo-versionmin
    type: mod_info
    severity: info
    since: "42.0.0"
    description: "mod.info should declare versionMin for B42 compatibility"
    field: "versionMin"
    check: "exists"

  # --- REMOVED / CHANGED APIs ---

  - id: b42-removed-isinventorypage
    type: api_removal
    severity: breaking
    since: "42.0.0"
    description: "ISInventoryPage removed — inventory UI completely rewritten in B42"
    pattern: "ISInventoryPage"
    scan: "*.lua"
    context: "B42 replaced the entire inventory UI framework"

  - id: b42-removed-isinventorypane
    type: api_removal
    severity: breaking
    since: "42.0.0"
    description: "ISInventoryPane removed — part of B41 inventory UI"
    pattern: "ISInventoryPane"
    scan: "*.lua"
    context: "B42 replaced the entire inventory UI framework"

  - id: b42-removed-transferall
    type: api_removal
    severity: breaking
    since: "42.0.0"
    description: "ISInventoryTransferAction removed — transfer system rewritten"
    pattern: "ISInventoryTransferAction"
    scan: "*.lua"
    context: "Inventory transfer actions are completely new in B42"

  - id: b42-changed-iscraftingui
    type: api_removal
    severity: breaking
    since: "42.0.0"
    description: "ISCraftingUI removed — crafting system completely overhauled in B42"
    pattern: "ISCraftingUI"
    scan: "*.lua"
    context: "B42 crafting system is entirely new"

  - id: b42-changed-recipe-system
    type: api_removal
    severity: breaking
    since: "42.0.0"
    description: "Old recipe Lua API removed — B42 uses new crafting system"
    pattern: "getKnownRecipes"
    scan: "*.lua"
    context: "Recipe system completely rewritten in B42"

  - id: b42-removed-istooltipinv
    type: api_removal
    severity: warning
    since: "42.0.0"
    description: "ISToolTipInv may be changed/removed in B42"
    pattern: "ISToolTipInv"
    scan: "*.lua"
    context: "Tooltip system updated with new inventory"

  - id: b42-old-modoptions
    type: api_removal
    severity: warning
    since: "42.0.0"
    description: "B41 ModOptions implementation replaced with native ModOptions API"
    pattern: "ModOptions:getInstance"
    scan: "*.lua"
    context: "B42 has a native ModOptions API — see https://pzwiki.net/wiki/ModOptions"

  # --- ITEM SYSTEM CHANGES ---

  - id: b42-old-item-type-food
    type: script_syntax
    severity: warning
    since: "42.0.0"
    description: "Food item Type may have changed format in B42"
    pattern: "Type\\s*=\\s*Food"
    regex: true
    scan: "*.txt"
    path: "media/scripts/"
    context: "Item definitions changed significantly in B42"

  # --- COMMON B41 PATTERNS THAT BREAK ---

  - id: b42-getspecificplayer
    type: api_rename
    severity: warning
    since: "42.0.0"
    description: "getSpecificPlayer may behave differently in B42 multiplayer"
    old_pattern: "getSpecificPlayer"
    new_name: "getPlayerByIndex (verify for B42)"
    scan: "*.lua"
    context: "Player indexing changed in B42"

  - id: b42-luamanager-globalobject
    type: deprecated
    severity: info
    since: "42.0.0"
    description: "Some LuaManager.GlobalObject methods deprecated in B42"
    pattern: "LuaManager.GlobalObject"
    scan: "*.lua"
    context: "Check against B42 JavaDocs for current API"
